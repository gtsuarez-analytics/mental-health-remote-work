# ================================================================================
# CONFIGURACIÓN DE PYTEST — SALUD MENTAL EN EL TRABAJO REMOTO
# ================================================================================
# Archivo de configuración para pytest con cobertura.
# ================================================================================

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --cov=etl --cov-report=term-missing --cov-report=html

[coverage:run]
source = etl
omit =
    */tests/*
    */.venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
